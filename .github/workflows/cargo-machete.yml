name: Cargo Machete

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  machete:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete

      - name: Check unused dependencies
        run: cargo machete
